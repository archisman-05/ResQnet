version: '3.9'

services:
  # ─── PostgreSQL + PostGIS ──────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: ngo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-ngo_resource_db}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ngo_resource_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ngo_net

  # ─── Redis (optional caching layer) ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ngo_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ngo_net

  # ─── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ngo_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:             production
      PORT:                 5000
      DATABASE_URL:         postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-ngo_resource_db}
      DB_HOST:              postgres
      DB_PORT:              5432
      DB_NAME:              ${DB_NAME:-ngo_resource_db}
      DB_USER:              ${DB_USER:-postgres}
      DB_PASSWORD:          ${DB_PASSWORD:-postgres}
      JWT_SECRET:           ${JWT_SECRET}
      JWT_REFRESH_SECRET:   ${JWT_REFRESH_SECRET}
      GEMINI_API_KEY:       ${GEMINI_API_KEY}
      AWS_ACCESS_KEY_ID:    ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY:${AWS_SECRET_ACCESS_KEY}
      AWS_REGION:           ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET:        ${AWS_S3_BUCKET}
      FRONTEND_URL:         ${FRONTEND_URL:-http://localhost:3000}
      WS_CORS_ORIGIN:       ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "5000:5000"
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ngo_net

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL:      ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
        NEXT_PUBLIC_WS_URL:       ${NEXT_PUBLIC_WS_URL:-http://localhost:5000}
        NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN}
    container_name: ngo_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - ngo_net

  # ─── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ngo_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - ngo_net

volumes:
  postgres_data:
  backend_logs:

networks:
  ngo_net:
    driver: bridge
